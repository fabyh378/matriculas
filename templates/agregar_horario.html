<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Horario - Liceo Claudina Urrutia de Lavín</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Liceo Claudina Urrutia de Lavín</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/logout">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Agregar Horario</h2>
        
        <form method="POST">
            <div class="mb-3">
                <label for="asignatura" class="form-label">Asignatura</label>
                <input type="text" class="form-control" id="asignatura" name="asignatura" required>
            </div>
            
            <div class="mb-3">
                <label for="docente_id" class="form-label">Docente</label>
                <select class="form-select" id="docente_id" name="docente_id" required>
                    <option value="">Seleccionar docente</option>
                    {% for docente in docentes %}
                    <option value="{{ docente[0] }}">{{ docente[1] }} ({{ docente[2] }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label for="dia_semana" class="form-label">Día de la Semana</label>
                <select class="form-select" id="dia_semana" name="dia_semana" required>
                    <option value="Lunes">Lunes</option>
                    <option value="Martes">Martes</option>
                    <option value="Miércoles">Miércoles</option>
                    <option value="Jueves">Jueves</option>
                    <option value="Viernes">Viernes</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="hora_inicio" class="form-label">Hora Inicio</label>
                <input type="time" class="form-control" id="hora_inicio" name="hora_inicio" required>
            </div>
            
            <div class="mb-3">
                <label for="hora_fin" class="form-label">Hora Fin</label>
                <input type="time" class="form-control" id="hora_fin" name="hora_fin" required>
            </div>
            
            <div class="mb-3">
                <label for="aula" class="form-label">Aula</label>
                <input type="text" class="form-control" id="aula" name="aula" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Guardar Horario</button>
            <a href="/horarios" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
