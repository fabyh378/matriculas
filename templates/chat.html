{% extends 'base.html' %}
{% block content %}
<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">
<i class="bi bi-chat-dots" style="font-size: 2rem; color: #003366;"></i>
<h2 style="margin: 0;">Chat de Solicitud de Permiso</h2>
</div>

<div class="row">
<div class="col-md-8 mx-auto">
<div class="card border-0 shadow-lg" style="border-radius: 15px;">
<div class="card-header" style="background: linear-gradient(135deg, #003366 0%, #0066cc 100%); color: white; border: none; padding: 1.5rem; border-radius: 15px 15px 0 0;">
<h5 style="margin: 0; font-weight: 600;"><i class="bi bi-chat-quote"></i> Conversación</h5>
</div>
<div class="card-body p-4">
<div id="chat-messages" style="height: 400px; overflow-y: auto; border: 1px solid #e9ecef; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; background: #f8f9fa;">
{% for mensaje in mensajes %}
<div class="message mb-3" style="display: flex; {% if mensaje[4] == session.user_id %}justify-content: flex-end;{% endif %}">
<div style="max-width: 70%; padding: 0.75rem 1rem; border-radius: 15px; {% if mensaje[4] == session.user_id %}background: #0066cc; color: white;{% else %}background: white; border: 1px solid #e9ecef;{% endif %}">
<strong>{{ mensaje[2] }}</strong><br>
{{ mensaje[0] }}<br>
<small style="opacity: 0.7;">{{ mensaje[1] }}</small>
</div>
</div>
{% endfor %}
</div>

<form method="POST" id="chat-form">
<div class="input-group">
<textarea class="form-control" name="mensaje" rows="2" placeholder="Escribe tu mensaje..." required style="border-radius: 10px 0 0 10px; resize: none;"></textarea>
<button class="btn btn-primary" type="submit" style="border-radius: 0 10px 10px 0;">
<i class="bi bi-send"></i>
</button>
</div>
</form>

<div class="mt-3 text-center">
<a href="/admin/permisos" class="btn btn-outline-secondary">
<i class="bi bi-arrow-left"></i> Volver a Solicitudes
</a>
</div>
</div>
</div>
</div>
</div>

<script>
document.getElementById('chat-form').addEventListener('submit', function(e) {
    setTimeout(function() {
        location.reload();
    }, 500);
});

// Auto-scroll to bottom
var chatMessages = document.getElementById('chat-messages');
chatMessages.scrollTop = chatMessages.scrollHeight;

// Refresh every 10 seconds
setInterval(function() {
    location.reload();
}, 10000);
</script>

<style>
.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important;
    transition: all 0.3s ease;
}
</style>
{% endblock %}
