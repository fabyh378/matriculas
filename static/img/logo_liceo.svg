<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente institucional -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rectángulo principal -->
  <rect width="300" height="120" fill="url(#grad1)" rx="10" ry="10"/>

  <!-- Escudo institucional -->
  <rect x="15" y="15" width="90" height="90" fill="url(#grad2)" rx="8" ry="8" stroke="#003366" stroke-width="3"/>
  <rect x="20" y="20" width="80" height="80" fill="none" stroke="#003366" stroke-width="2" rx="5" ry="5"/>

  <!-- Elementos del escudo -->
  <!-- Libro abierto -->
  <rect x="35" y="45" width="50" height="35" fill="#003366" rx="2"/>
  <rect x="37" y="43" width="46" height="6" fill="#0066cc" rx="2"/>
  <!-- Líneas del libro -->
  <line x1="40" y1="55" x2="78" y2="55" stroke="#ffffff" stroke-width="1"/>
  <line x1="40" y1="60" x2="78" y2="60" stroke="#ffffff" stroke-width="1"/>
  <line x1="40" y1="65" x2="73" y2="65" stroke="#ffffff" stroke-width="1"/>
  <line x1="40" y1="70" x2="75" y2="70" stroke="#ffffff" stroke-width="1"/>

  <!-- Cruz en la parte superior -->
  <rect x="55" y="25" width="10" height="15" fill="#cc0000"/>
  <rect x="50" y="30" width="20" height="5" fill="#cc0000"/>

  <!-- Texto principal -->
  <text x="120" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
    LICEO CLAUDINA
  </text>
  <text x="120" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">
    URRUTIA DE LAVÍN
  </text>

  <!-- Texto secundario -->
  <text x="120" y="70" font-family="Arial, sans-serif" font-size="9" fill="#e6f3ff">
    Liceo Municipal • Ñuñoa
  </text>
  <text x="120" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e6f3ff">
    Sistema de Gestión Educacional
  </text>

  <!-- Elemento decorativo inferior -->
  <rect x="0" y="105" width="300" height="15" fill="#002244" opacity="0.8"/>
  <text x="150" y="115" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">
    EXCELENCIA • DISCIPLINA • FORMACIÓN INTEGRAL • INNOVACIÓN
  </text>
</svg>